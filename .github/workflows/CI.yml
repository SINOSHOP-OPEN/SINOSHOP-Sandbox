name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install numpy h5py pytest
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
    
    - name: Check code formatting
      run: |
        pip install black
        black --check src/ scripts/